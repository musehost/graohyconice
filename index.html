<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphyconice® - GraphyconStudii™</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- BARRA DE MENÚ TIPO APP -->
    <nav class="menu-bar">
        <div class="menu-item">Archivo
            <div class="dropdown">
                <a href="#" onclick="abrirArchivo()">Abrir</a>
                <a href="#" onclick="guardarSVG()">Guardar SVG</a>
                <a href="#" onclick="exportarPNG()">Exportar PNG</a>
            </div>
        </div>
        <div class="menu-item">Editar
            <div class="dropdown">
                <a href="#" onclick="deshacer()">Deshacer</a>
                <a href="#" onclick="rehacer()">Rehacer</a>
            </div>
        </div>
        <div class="menu-item">Procesar
            <div class="dropdown">
                <a href="#" onclick="separarColores()">Separar Colores</a>
                <a href="#" onclick="agregarOutlines()">Agregar Outlines</a>
                <a href="#" onclick="aplicarGhostLight()">Ghost Light</a>
            </div>
        </div>
        <div class="menu-item">Voz
            <div class="dropdown">
                <a href="#" onclick="iniciarVoz()">Activar Comandos</a>
                <a href="#" onclick="detenerVoz()">Desactivar</a>
            </div>
        </div>
    </nav>

    <!-- TU APP ACTUAL ABAJO -->
    <div class="container">
        <h1>Gráfico Nise</h1>
        <p>Separa colores → Agrega outlines → Exporta SVG</p>
        
        <input type="file" id="fileInput" accept="image/*">
        
        <button id="btnSeparar" onclick="separarColores()">1. Separar Colores</button>
        <button id="btnOutlines" onclick="agregarOutlines()" disabled>2. Agregar Outlines</button>
        <button id="btnExportar" onclick="guardarSVG()" disabled>3. Exportar SVG</button>

        <div class="preview">
            <h3>Original</h3>
            <canvas id="canvas"></canvas>
        </div>
        <div class="layers">
            <h3>Layers por Color</h3>
            <div id="colorLayers"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
